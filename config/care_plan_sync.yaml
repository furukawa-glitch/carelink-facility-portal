# 居宅サービス計画書 × 訪問看護計画書 の照合・SOAP起因の計画更新フラグ
# operations/care_plan_reconciler.py が読み込む（機微情報なしの汎用ルール）
#
# 注意: 「一文字単位の完全一致」は様式差・改行差で実務上ほぼ不可能なため、
# 正規化後の必須語反映・矛盾ペア・行類似度で「矛盾・漏れ候補」を出す。
# 最終判断は看護・ケアマネ。

version: "0.1"

# SOAP に以下のいずれかが含まれる → 計画書更新の必要あり（フラグ）
soap_plan_update_triggers:
  severity: error
  any_keywords:
    - "状態変化"
    - "区分変更"
    - "要介護度"
    - "要支援"
    - "認定"
    - "見直し"
    - "計画変更"
    - "サービス変更"
    - "入院"
    - "退院"
    - "転院"
    - "急性増悪"
    - "悪化"
    - "容体変化"
    - "新たな"
    - "新規"
    - "発症"
    - "転倒"
    - "骨折"
    - "意識変化"
    - "閉塞"
    - "ショック"
    - "蘇生"
    - "搬送"
    - "救急"

# 居宅側テキストに含まれる場合、訪問看護計画書側にも同語（正規化後）が必要＝漏れ警告
home_must_reflect_in_visit:
  - "胃ろう"
  - "ＮＧ"
  - "NG"
  - "経管"
  - "気管"
  - "カニューレ"
  - "吸引"
  - "褥瘡"
  - "床ずれ"
  - "透析"
  - "在宅酸素"
  - "ＶＳ"
  - "VS"
  - "中心静脈"
  - "ＰＩＣＣ"
  - "PICC"
  - "糖尿病足"
  - "ターミナル"
  - "看取"

# 左側のいずれかが居宅にあり、右側のいずれかが訪問看護にあり → 矛盾警告（両文書に食い違う記述の疑い）
contradiction_pairs:
  - id: adl_walk
    left: ["全介助", "寝たきり", "車いす生活"]
    right: ["自歩", "独歩", "杖歩行", "室外歩行"]
    detail: 移動・ADLの記載が両計画で両立しにくい組み合わせ
  - id: meal_oral
    left: ["経口摂取のみ", "経口中心"]
    right: ["経管栄養", "胃ろう", "ＮＧ", "NG"]
    detail: 摂取経路の記載が両立しにくい
  - id: consciousness
    left: "清明"
    right: ["意識障害", "傾眠", "もうろう", "ＪＣＳ", "JCS"]
    detail: 意識レベルの記載の食い違い疑い

# 行単位の類似度チェック（任意・ノイズに注意）
line_similarity:
  enabled: true
  min_home_line_length: 12
  similarity_threshold: 0.62
  max_home_lines_to_scan: 80
