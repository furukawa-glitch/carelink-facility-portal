# 架空プロフィール（伊勢様タイプのデモ）。氏名・識別子は含めない。
patient_id: "DEMO_ISE_TYPE"
display_name_note: "デモ（在宅重症・気管切開・経管イメージ）"

face_sheet:
  adl_mobility: "全介助"
  devices:
    - "気管カニューレ"
    - "経管栄養"
  risk_flags:
    - "褥瘡リスク"
    - "誤嚥性肺炎リスク"

# 訪問看護計画書の目標（テキスト＋照合用キーワード）
care_plan_nursing:
  goals:
    - id: NG1
      text: "気道感染を起こさない（喀痰排出・カフ管理の維持）"
      keywords: ["喀痰", "吸引", "カフ", "気管", "呼吸音", "SpO2", "酸素"]
    - id: NG2
      text: "栄養状態を維持する（経管栄養の安全な管理）"
      keywords: ["経管", "胃ろう", "栄養", "注入", "固定", "残餌"]
    - id: NG3
      text: "褥瘡を悪化させない（除圧・皮膚観察）"
      keywords: ["褥瘡", "発赤", "皮膚", "除圧", "ドレッシング", "創"]
    - id: NG4
      text: "在宅療養の意思に沿った支援（家族との情報共有）"
      keywords: ["家族", "説明", "希望", "在宅", "相談"]
